<h2>SlideRoomの認証コード</h2>

<p>SlideRoomへの登録ありがとうございます。</p>

<p>以下の6桁のパスコードを、登録画面に入力してください。</p>

<div style="font-size:32px;font-weight:700;letter-spacing:6px;margin:24px 0;padding:18px 22px;border-radius:12px;background:#f3f8ff;color:#075cff;text-align:center;">
  {{ .Token }}
</div>

<p>このパスコードは一定時間で無効になります。</p>

<p>メールが見つからない場合は、迷惑メールフォルダに分類されている可能性があります。</p>

<p>このメールに心当たりがない場合は、破棄してください。</p>
